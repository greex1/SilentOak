<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的世界互通服 - 欢迎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 15vh;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        /* 绿色大字 - 无阴影 */
        .main-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            color: #2ECC40;
            letter-spacing: 0.15em;
            margin-bottom: 16px;
        }

        /* 小字区域 - 间距紧凑 */
        .sub-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        /* 群号一行 - 无阴影 */
        .qq-line {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: #FFDAB9;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .qq-line .label {
            margin-right: 12px;
        }

        /* 服务器地址 - 无阴影 */
        .server-address {
            font-size: clamp(1.1rem, 2.8vw, 1.6rem);
            font-weight: 700;
            color: #FFDAB9;
            letter-spacing: 0.1em;
            font-family: 'Courier New', monospace;
        }

        /* 按钮区域 */
        .buttons {
            margin-top: 50px;
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .acrylic-btn {
            display: inline-block;
            padding: 16px 50px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.35s ease;
            cursor: pointer;
            letter-spacing: 0.1em;
        }

        .acrylic-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .acrylic-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            .buttons {
                flex-direction: column;
                gap: 20px;
                align-items: center;
            }
            .acrylic-btn {
                width: 220px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">我的世界互通服欢迎您</h1>

        <div class="sub-info">
            <div class="qq-line">
                <span class="label">服务器群号</span>
                <span class="number">1049170891</span>
            </div>
            <div class="server-address">play.simpfun</div>
        </div>

        <div class="buttons">
            <a href="home.html" class="acrylic-btn">🏠 访问首页</a>
            <a href="submit.html" class="acrylic-btn">📮 投稿箱</a>
        </div>
    </div>

</body>
</html>
